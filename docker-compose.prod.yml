services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crime}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crime}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./safetynet-api
    image: ${IMAGE_REGISTRY:-local}/safetynet-api:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-crime}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VALIDATION_ENABLED: ${TWILIO_VALIDATION_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ./safetynet-ui
      args:
        VITE_API_BASE_URL: https://${DOMAIN}
    image: ${IMAGE_REGISTRY:-local}/safetynet-ui:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
