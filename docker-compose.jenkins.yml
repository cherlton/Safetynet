services:
  jenkins:
    build:
      context: ./jenkins
    container_name: safetynet-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace/safetynet
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=true

volumes:
  jenkins_home:
