spring.application.name=safetynet-api

# Database Connection
spring.datasource.url=jdbc:h2:mem:crime;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=


# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# AI Service (Anthropic)
anthropic.api-key=${ANTHROPIC_API_KEY:mock-key}
anthropic.model=${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}

# AI Service (Gemini)
gemini.api-key=${GEMINI_API_KEY:mock-key}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Twilio Webhook Configuration
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.validation-enabled=${TWILIO_VALIDATION_ENABLED:false}
spring.docker.compose.enabled=false
